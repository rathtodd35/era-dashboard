<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERA Coverage Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f9fa;
      color: #1a2332;
      padding: 20px 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 740px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      margin-bottom: 20px;
    }
    .brand {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0d6e6e;
      margin-bottom: 2px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a2332;
      margin-bottom: 6px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .meta .timestamp {
      font-size: 0.8rem;
      color: #5a6a7a;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      background: #1a3a4a;
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 5px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #0d6e6e; }
    .btn:active { background: #095555; }
    .btn-secondary {
      background: white;
      color: #1a3a4a;
      border: 1px solid #d0d7de;
    }
    .btn-secondary:hover { background: #f0f4f7; border-color: #0d6e6e; color: #0d6e6e; }

    /* Summary cards */
    .summary {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat {
      background: white;
      border-radius: 8px;
      padding: 14px 16px;
      flex: 1;
      min-width: 90px;
      text-align: center;
      border: 1px solid #e8ecf0;
    }
    .stat .number { font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
    .stat .label { font-size: 0.68rem; color: #5a6a7a; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .stat.red .number { color: #c0392b; }
    .stat.yellow .number { color: #b8860b; }
    .stat.green .number { color: #1a8a5c; }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: white;
      color: #3a4a5a;
      border: 1px solid #d0d7de;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #0d6e6e; color: #0d6e6e; }
    .filter-btn.active {
      background: #0d6e6e;
      color: white;
      border-color: #0d6e6e;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e8ecf0;
    }
    th {
      background: #1a3a4a;
      color: white;
      text-align: left;
      padding: 11px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f2f4;
      font-size: 0.88rem;
    }
    tr:last-child td { border-bottom: none; }
    tr.zero { background: #fef2f2; }
    tr.low { background: #fefce8; }
    tr.good { background: #f0fdf4; }
    tr.zero td:last-child { color: #c0392b; font-weight: 600; }
    tr.low td:last-child { color: #b8860b; font-weight: 600; }
    tr.good td:last-child { color: #1a8a5c; font-weight: 600; }

    .loading, .error {
      text-align: center;
      padding: 48px 16px;
      font-size: 0.95rem;
    }
    .loading { color: #5a6a7a; }
    .error { color: #c0392b; }
    .empty { text-align: center; padding: 32px; color: #5a6a7a; font-size: 0.9rem; }

    /* PDF capture area */
    #pdf-target { padding: 0; }

    @media (max-width: 520px) {
      body { padding: 14px 12px; }
      h1 { font-size: 1.25rem; }
      .summary { gap: 8px; }
      .stat { padding: 10px 8px; min-width: 80px; }
      .stat .number { font-size: 1.5rem; }
      .filters { gap: 5px; }
      .filter-btn { padding: 5px 10px; font-size: 0.72rem; }
      td, th { padding: 8px 10px; font-size: 0.8rem; }
      .actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">Elite Replay Academy</div>
      <h1 id="title">Coverage Dashboard</h1>
      <div class="meta">
        <span class="timestamp" id="timestamp">Loading...</span>
        <div class="actions">
          <button class="btn btn-secondary" onclick="fetchData()">Refresh</button>
          <button class="btn" onclick="downloadPDF()">Download PDF</button>
        </div>
      </div>
    </div>

    <div id="pdf-target">
      <div class="summary" id="summary"></div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="rc">RC Only</button>
        <button class="filter-btn" data-filter="ro">RO Only</button>
        <button class="filter-btn" data-filter="zero">Zero Evals</button>
        <button class="filter-btn" data-filter="attention">Needs Attention</button>
      </div>
      <div id="content">
        <div class="loading">Loading coverage data...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpjtwoEMprsZXCoBl5F5g9_fv_5pkPQ5CM9lJh5TfNzcO0_SllKZMznV0TjY2kkQIkKuhwFtikaR_k/pub?gid=1245244082&single=true&output=csv";

    var allRows = [];
    var activeFilter = "all";

    // --- Filter buttons ---
    document.getElementById("filters").addEventListener("click", function(e) {
      if (!e.target.classList.contains("filter-btn")) return;
      activeFilter = e.target.getAttribute("data-filter");
      // Update active state
      var btns = document.querySelectorAll(".filter-btn");
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
      e.target.classList.add("active");
      renderTable(filterRows(allRows));
    });

    function filterRows(rows) {
      if (activeFilter === "all") return rows;
      return rows.filter(function(row) {
        var count = parseInt(row["Eval Count"] || "0", 10);
        var role = (row["Role"] || "").trim().toUpperCase();
        switch (activeFilter) {
          case "rc": return role === "RC";
          case "ro": return role === "RO";
          case "zero": return count === 0;
          case "attention": return count < 3;
          default: return true;
        }
      });
    }

    // --- Fetch data ---
    function fetchData() {
      document.getElementById("content").innerHTML = '<div class="loading">Loading...</div>';
      document.getElementById("summary").innerHTML = "";

      var url = CSV_URL + "&_t=" + Date.now();

      Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          if (results.errors.length > 0 && results.data.length === 0) {
            document.getElementById("content").innerHTML =
              '<div class="error">Failed to load data. Check that the sheet is published.</div>';
            return;
          }
          allRows = results.data;
          renderSummary(allRows);
          renderTable(filterRows(allRows));
          document.getElementById("timestamp").textContent =
            "Updated " + new Date().toLocaleString();
        },
        error: function(err) {
          document.getElementById("content").innerHTML =
            '<div class="error">Error: ' + err.message + '</div>';
        }
      });
    }

    // --- Render summary cards ---
    function renderSummary(rows) {
      var zero = 0, low = 0, good = 0;
      rows.forEach(function(row) {
        var count = parseInt(row["Eval Count"] || "0", 10);
        if (count === 0) zero++;
        else if (count <= 2) low++;
        else good++;
      });

      document.getElementById("summary").innerHTML =
        '<div class="stat red"><div class="number">' + zero + '</div><div class="label">Zero Evals</div></div>' +
        '<div class="stat yellow"><div class="number">' + low + '</div><div class="label">1-2 Evals</div></div>' +
        '<div class="stat green"><div class="number">' + good + '</div><div class="label">3+ Evals</div></div>';
    }

    // --- Render table ---
    function renderTable(rows) {
      if (rows.length === 0) {
        document.getElementById("content").innerHTML =
          '<div class="empty">No participants match this filter.</div>';
        return;
      }

      // Sort: zeros first, then by count, then by name
      rows.sort(function(a, b) {
        var ca = parseInt(a["Eval Count"] || "0", 10);
        var cb = parseInt(b["Eval Count"] || "0", 10);
        if (ca !== cb) return ca - cb;
        return (a["Participant"] || "").localeCompare(b["Participant"] || "");
      });

      var html = "<table><thead><tr><th>Participant</th><th>Role</th><th>Evals</th></tr></thead><tbody>";
      rows.forEach(function(row) {
        var count = parseInt(row["Eval Count"] || "0", 10);
        var cls = count === 0 ? "zero" : (count <= 2 ? "low" : "good");
        html += '<tr class="' + cls + '">' +
          "<td>" + escHtml(row["Participant"] || "") + "</td>" +
          "<td>" + escHtml(row["Role"] || "") + "</td>" +
          "<td>" + count + "</td></tr>";
      });
      html += "</tbody></table>";
      document.getElementById("content").innerHTML = html;
    }

    // --- PDF download ---
    function downloadPDF() {
      var element = document.getElementById("pdf-target");
      var today = new Date().toISOString().slice(0, 10);
      var filename = "ERA_Coverage_" + today + ".pdf";

      var opt = {
        margin: [10, 10, 10, 10],
        filename: filename,
        image: { type: "jpeg", quality: 0.95 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
      };

      html2pdf().set(opt).from(element).save();
    }

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Load on page open
    fetchData();
  </script>
</body>
</html>
